<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The page you were looking for could not be found." />
  <title>Cozytek 404</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --grid: rgba(22, 22, 22, 0.03);
      --line: rgba(22, 22, 22, 0.14);
      --text: #1f1f1f;
      --muted: #66625c;
      --panel: rgba(246, 241, 231, 0.94);
      --panel-border: rgba(31, 31, 31, 0.08);
      --blue: #62c3ea;
      --green: #69c86f;
      --red: #f06554;
      --yellow: #f7bb27;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 18% 14%, rgba(247, 187, 39, 0.12), transparent 0 14%),
        radial-gradient(circle at 85% 78%, rgba(247, 187, 39, 0.09), transparent 0 15%),
        radial-gradient(circle at 20% 75%, rgba(98, 195, 234, 0.09), transparent 0 18%),
        radial-gradient(circle at 55% 56%, rgba(240, 101, 84, 0.06), transparent 0 13%),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: auto, auto, auto, auto, 34px 34px, 34px 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.32), transparent 20%, transparent 80%, rgba(255, 255, 255, 0.2)),
        radial-gradient(circle at center, transparent 56%, rgba(255, 255, 255, 0.14));
      pointer-events: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .scene::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(860px, 86vw);
      height: min(400px, 48vh);
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse at center, rgba(246, 241, 231, 0.97) 0%, rgba(246, 241, 231, 0.93) 58%, rgba(246, 241, 231, 0) 100%);
    }

    .shape,
    .line,
    .bit,
    .ring {
      position: absolute;
    }

    .shape {
      width: clamp(24px, 3.6vw, 44px);
      aspect-ratio: 1;
      opacity: 0.88;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.03);
    }

    .shape.yellow-a {
      background: var(--yellow);
      top: 30px;
      left: 18px;
    }

    .shape.green-a {
      background: var(--green);
      top: 98px;
      right: 24%;
    }

    .shape.blue-a {
      background: var(--blue);
      bottom: 96px;
      left: -8px;
    }

    .shape.red-a {
      background: var(--red);
      bottom: 34px;
      right: 30%;
    }

    .shape.yellow-b {
      background: var(--yellow);
      bottom: 66px;
      right: -8px;
    }

    .line {
      background: var(--line);
    }

    .line.v1 {
      top: 78px;
      left: 22%;
      width: 1px;
      height: 84px;
    }

    .line.h1 {
      top: 104px;
      right: 12%;
      width: 136px;
      height: 1px;
    }

    .line.h2 {
      bottom: 142px;
      left: 12px;
      width: 136px;
      height: 1px;
    }

    .line.v2 {
      bottom: 34px;
      right: 37%;
      width: 1px;
      height: 88px;
    }

    .line.h3 {
      bottom: 64px;
      right: 14%;
      width: 110px;
      height: 1px;
    }

    .bit {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(31, 31, 31, 0.4);
      white-space: nowrap;
    }

    .bit.b1 {
      top: 146px;
      left: 54px;
    }

    .bit.b2 {
      bottom: 86px;
      left: 16px;
    }

    .bit.b3 {
      right: 34px;
      bottom: 150px;
      writing-mode: vertical-rl;
      letter-spacing: 0.08em;
    }

    .ring {
      width: 8px;
      height: 8px;
      border: 1px solid rgba(31, 31, 31, 0.22);
      border-radius: 999px;
      background: transparent;
    }

    .ring.r1 {
      top: 68px;
      left: 31%;
    }

    .ring.r2 {
      top: 208px;
      right: 22%;
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(720px, 100%);
      padding: 34px 28px;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .code {
      margin: 0;
      font-size: clamp(64px, 14vw, 124px);
      line-height: 0.94;
      letter-spacing: -0.04em;
      font-weight: 500;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
      font-weight: 500;
      text-wrap: balance;
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 36ch;
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.65;
      color: var(--muted);
      text-wrap: balance;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .button,
    .text-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      font-size: 14px;
      text-decoration: none;
      border-radius: 999px;
      transition: transform 120ms ease, border-color 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .button {
      color: var(--bg);
      background: var(--text);
      border: 1px solid var(--text);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .text-link {
      color: var(--muted);
      border: 1px solid rgba(31, 31, 31, 0.14);
      background: rgba(255, 255, 255, 0.46);
    }

    .text-link:hover {
      color: var(--text);
      border-color: rgba(31, 31, 31, 0.28);
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 14px;
      }

      .panel {
        padding: 28px 18px;
        border-radius: 18px;
      }

      .shape {
        width: 24px;
      }

      .line.h1,
      .line.h2,
      .line.h3 {
        width: 84px;
      }

      .line.v1,
      .line.v2 {
        height: 62px;
      }

      .bit {
        font-size: 10px;
        letter-spacing: 0.08em;
      }

      .bit.b3,
      .ring.r2,
      .shape.red-a {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="shape yellow-a"></div>
    <div class="shape green-a"></div>
    <div class="shape blue-a"></div>
    <div class="shape red-a"></div>
    <div class="shape yellow-b"></div>

    <div class="line v1"></div>
    <div class="line h1"></div>
    <div class="line h2"></div>
    <div class="line v2"></div>
    <div class="line h3"></div>

    <div class="bit b1">00101101</div>
    <div class="bit b2">11001010</div>
    <div class="bit b3">404</div>

    <div class="ring r1"></div>
    <div class="ring r2"></div>
  </div>

  <main class="panel">
    <p class="eyebrow">Cozytek</p>
    <p class="code">404</p>
    <h1>Lost in the grid.</h1>
    <p class="subtitle">
      The page you were looking for is missing, moved, or not part of this build.
      The main path back is still intact.
    </p>
    <div class="actions">
      <a class="button" href="/">Return Home</a>
      <a class="text-link" href="/privacy.html">Privacy Policy</a>
    </div>
  </main>
</body>
</html>
